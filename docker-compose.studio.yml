  pg-meta:
    image: supabase/postgres-meta:v0.96.4
    restart: unless-stopped
    environment:
      PG_META_PORT: 8080
      PG_META_DB_HOST: 192.168.3.64
      PG_META_DB_PORT: 5432
      PG_META_DB_NAME: 7_insumos_rado
      PG_META_DB_USER: postgres
      PG_META_DB_PASSWORD: Jo.9839514500
    ports:
      - "5555:8080"

  # --- Supabase Studio ---
  studio:
    image: supabase/studio:2026.04.20-sha-b721a2d
    restart: unless-stopped
    depends_on:
      - pg-meta
    environment:
      STUDIO_PG_META_URL: http://pg-meta:8080
      POSTGRES_PASSWORD: Jo.9839514500
      
      # Forzamos modo local sin auth externa
